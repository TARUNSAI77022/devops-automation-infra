AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to deploy a VPC, Public Subnet, Security Group, 
  and an EC2 instance (Ubuntu 24.04 LTS) with Docker pre-installed in the ap-south-2 region.

Parameters:
  UbuntuAmiId:
    Type: String
    Default: 'ami-070e5bd3ff10324f8'
    Description: AMI ID for Ubuntu 24.04 LTS in ap-south-2 (provided by user)





Resources:
  # ----------------------------------------------------------------------------
  # Networking
  # ----------------------------------------------------------------------------
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: 'devops-automation-vpc'

  MyInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IGW'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref MyInternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '10.0.1.0/24'
      AvailabilityZone: 'ap-south-2a'
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: 'devops-automation-public-subnet'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PublicSubnet-RT'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref MyInternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ----------------------------------------------------------------------------
  # Security Group
  # ----------------------------------------------------------------------------
  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Security group for ${AWS::StackName}'
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: '0.0.0.0/0'
          Description: 'Allow SSH'
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'
          Description: 'Allow HTTP'
        - IpProtocol: tcp
          FromPort: 81
          ToPort: 81
          CidrIp: '0.0.0.0/0'
          Description: 'Allow Port 81'
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: '0.0.0.0/0'
          Description: 'Allow HTTPS'
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: '0.0.0.0/0'
          Description: 'Allow xyOps dashboard'
        - IpProtocol: tcp
          FromPort: 9090
          ToPort: 9090
          CidrIp: '0.0.0.0/0'
          Description: 'Allow OpenClaw dashboard'
        - IpProtocol: tcp
          FromPort: 5522
          ToPort: 5522
          CidrIp: '0.0.0.0/0'
          Description: 'Allow xyOps communication'
        - IpProtocol: tcp
          FromPort: 5523
          ToPort: 5523
          CidrIp: '0.0.0.0/0'
          Description: 'Allow xyOps communication'
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: '0.0.0.0/0'
          Description: 'Allow all outbound traffic'
      Tags:
        - Key: Name
          Value: 'devops-automation-sg'

  # ----------------------------------------------------------------------------
  # EC2 Instance
  # ----------------------------------------------------------------------------
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: 't3.large'
      ImageId: !Ref UbuntuAmiId
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref MySecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 50
            VolumeType: 'gp3'
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Add Docker's official GPG key:
          sudo apt update -y
          sudo apt install -y ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          # Add the repository to Apt sources:
          sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: $(. /etc/os-release && echo "${!UBUNTU_CODENAME:-$VERSION_CODENAME}")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF

          sudo apt update -y
          sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          systemctl enable docker
          systemctl start docker
          usermod -aG docker ubuntu

          # Create directory structure for xyOps
          mkdir -p /home/ubuntu/xyops/conf

          # Create docker-compose.yml
          cat << 'EOF' > /home/ubuntu/xyops/docker-compose.yml
          services:
            xyops:
              image: ghcr.io/pixlcore/xyops:latest
              container_name: xyops-server
              init: true
              restart: unless-stopped
              environment:
                XYOPS_xysat_local: "true"
                TZ: Asia/Kolkata
              volumes:
                - xy-data:/opt/xyops/data
                - /home/ubuntu/xyops/conf:/opt/xyops/conf
                - /var/run/docker.sock:/var/run/docker.sock
              ports:
                - "5522:5522"
                - "5523:5523"

          volumes:
            xy-data:
          EOF

          # Ensure the ubuntu user has appropriate permissions
          chown -R ubuntu:ubuntu /home/ubuntu/xyops

          # Start xyOps container using docker compose
          cd /home/ubuntu/xyops
          docker compose up -d
      Tags:
        - Key: Name
          Value: 'devops-automation-server'

# ------------------------------------------------------------------------------
# Outputs
# ------------------------------------------------------------------------------
Outputs:
  EC2PublicIP:
    Description: 'Public IP of the deployed EC2 instance'
    Value: !GetAtt MyEC2Instance.PublicIp
  VPCId:
    Description: 'ID of the newly created VPC'
    Value: !Ref MyVPC
  SubnetId:
    Description: 'ID of the Public Subnet'
    Value: !Ref PublicSubnet
  SecurityGroupId:
    Description: 'ID of the newly created Security Group'
    Value: !Ref MySecurityGroup
